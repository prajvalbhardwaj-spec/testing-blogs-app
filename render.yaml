services:
  - type: web
    name: blog-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:10000
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /

databases:
  - name: blog-db
    databaseName: blogdb
    user: bloguser
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all inbound traffic
